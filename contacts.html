<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contacts</title>

    <meta name="description" content="Простий сайт ToDoList для керування завданнями. Додавайте, редагуйте та слідкуйте за своїми завданнями.">
    <meta property="og:title" content="ToDoList">
    <meta property="og:description" content="Простий сайт ToDoList для керування завданнями. Додавайте, редагуйте та слідкуйте за своїми завданнями.">
    <meta property="og:image" content="https://blog.lulu.com/content/images/2024/12/072120-ToDoList-Blog.png">
<!--    <link rel="stylesheet" href="contacts.css">-->
<!--    <link rel="stylesheet" href="style3.css">-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="form.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="font-[Roboto] bg-gray-100 min-h-screen grid grid-rows-[auto_1fr_auto]">
    <header class="bg-blue-700 text-white">
        <div class="flex justify-between items-center p-4">
            <div class="text-2xl font-bold">Контакти</div>
            <input id="menu-toggle" type="checkbox" class="hidden peer">
            <label for="menu-toggle" class="md:hidden flex flex-col gap-1 cursor-pointer">
                <span class="block w-8 h-1 bg-white"></span>
                <span class="block w-8 h-1 bg-white"></span>
                <span class="block w-8 h-1 bg-white"></span>
            </label>
            <nav class="hidden peer-checked:block md:flex md:gap-8 absolute md:static top-16 left-0 w-full md:w-auto bg-blue-700 md:bg-transparent">
                <ul class="flex flex-col md:flex-row w-full md:w-auto">
                    <li class="border-b md:border-0"><a href="index.html" class="block p-4 hover:bg-blue-600 text-xl">Головна</a></li>
                    <li class="border-b md:border-0"><a href="catalog.html" class="block p-4 hover:bg-blue-600 text-xl">Каталог</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="grid place-items-center">
        <form id="contact-form" class="bg-white shadow-lg rounded-2xl p-6 w-full max-w-2xl space-y-6">
            <fieldset class="border rounded-xl p-4 space-y-4">
                <legend class="font-bold text-lg px-2">Особиста інформація</legend>

                <div class="relative">
                    <label for="name" class="block mb-1 font-medium">Ім'я</label>
                    <input id="name" name="name" type="text" required
                           class="peer w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <span class="absolute right-3 bottom-2.5 pointer-events-none text-lg font-bold
                        peer-valid:after:content-['✔'] peer-valid:after:text-green-500">
                    </span>
                </div>

                <div class="relative">
                    <label for="email" class="block mb-1 font-medium">Email</label>
                    <input id="email" name="email" type="email" required placeholder=" "
                           class="peer w-full p-3 border rounded-lg focus:outline-none focus:ring-2 valid:border-green-500 focus:invalid:border-red-500 focus:invalid:ring-red-300">

                    <span class="absolute right-3 bottom-2.5 pointer-events-none text-lg font-bold
                        peer-valid:after:content-['✔'] peer-valid:after:text-green-500
                        peer-not-placeholder-shown:peer-invalid:after:content-['✕']
                        peer-not-placeholder-shown:peer-invalid:after:text-red-500">
                    </span>
                </div>

                <div class="relative">
                    <label for="phone" class="block mb-1 font-medium">Телефон</label>
                    <input id="phone" name="phone" type="tel" required
                           pattern="^\+380\d{9}$"
                           placeholder="+380XXXXXXXXX"
                           class="peer w-full p-3 border rounded-lg focus:outline-none focus:ring-2 valid:border-green-500 focus:invalid:border-red-500 focus:invalid:ring-red-300">

                    <span class="absolute right-3 bottom-2.5 pointer-events-none text-lg font-bold
                        peer-valid:after:content-['✔'] peer-valid:after:text-green-500
                        peer-not-placeholder-shown:peer-invalid:after:content-['✕']
                        peer-not-placeholder-shown:peer-invalid:after:text-red-500">
                    </span>
                </div>

                <div class="relative">
                    <label for="password" class="block mb-1 font-medium">Пароль</label>
                    <input id="password" name="password" type="password" required placeholder=" " minlength="10"
                           class="peer w-full p-3 border rounded-lg focus:outline-none focus:ring-2 valid:border-green-500 focus:invalid:border-red-500 focus:invalid:ring-red-300">

                    <span class="absolute right-3 bottom-2.5 pointer-events-none text-lg font-bold
                        peer-valid:after:content-['✔'] peer-valid:after:text-green-500
                        peer-not-placeholder-shown:peer-invalid:after:content-['✕']
                        peer-not-placeholder-shown:peer-invalid:after:text-red-500">
                    </span>
                </div>

                <div class="relative">
                    <label for="message" class="block mb-1 font-medium">
                        Повідомлення
                    </label>

                    <textarea
                        id="message"
                        name="message"
                        required
                        class="w-full p-3 border rounded-lg">
                    </textarea>
                </div>

            </fieldset>
            <fieldset class="border rounded-xl p-4 space-y-4">
                <legend class="font-bold text-lg px-2">Налаштування завдання</legend>
                <div>
                    <p class="font-semibold mb-2">Пріоритет</p>

                    <label class="flex items-center gap-2"><input type="radio" name="priority">Високий</label>

                    <label class="flex items-center gap-2"><input type="radio" name="priority">Середній</label>

                    <label class="flex items-center gap-2"><input type="radio" name="priority">Низький</label>
                </div>
                <div>
                    <p class="font-semibold mb-2">Теги</p>

                    <label class="flex items-center gap-2"><input type="checkbox">Робота</label>

                    <label class="flex items-center gap-2"><input type="checkbox">Домашнє</label>

                    <label class="flex items-center gap-2"><input type="checkbox">Термінове</label>
                </div>

                <label for="category" class="block font-semibold mb-2">Категорія</label>
                <select id="category" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option hidden>Оберіть категорію</option>
                    <option>Здоров'я</option>
                    <option>Хобі</option>
                    <option>Офісні завдання</option>
                    <option>Проекти</option>
                </select>
            </fieldset>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">Відправити</button>
        </form>
    </main>
    <footer class="bg-blue-700 text-white text-center p-4">2026 ToDoList</footer>
</body>
</html>
